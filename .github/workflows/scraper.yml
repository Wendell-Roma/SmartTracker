name: 🔍 Price Check

on:
  schedule:
    # Roda a cada 6 horas (UTC): 00h, 06h, 12h, 18h
    - cron: "0 0,6,12,18 * * *"

  # Permite rodar manualmente pelo painel do GitHub
  workflow_dispatch:

jobs:
  check-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout do repositório
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 📦 Instalar dependências
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      # Restaura o banco de dados do cache entre execuções
      - name: 💾 Restaurar banco de dados
        uses: actions/cache@v4
        with:
          path: prices.db
          key: prices-db-${{ github.ref_name }}
          restore-keys: prices-db-

      - name: 🔍 Verificar preços
        env:
          DATABASE_URL:        ${{ secrets.DATABASE_URL || 'sqlite:///prices.db' }}
          EMAIL_SENDER:        ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:      ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVER:      ${{ secrets.EMAIL_RECEIVER }}
          TELEGRAM_TOKEN:      ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          ML_APP_ID:           ${{ secrets.ML_APP_ID }}
          ML_CLIENT_SECRET:    ${{ secrets.ML_CLIENT_SECRET }}
          REQUEST_TIMEOUT:     "20"
          RETRY_ATTEMPTS:      "3"
        run: |
          python -c "
          from app.db.database import init_db
          from app.scheduler import check_all_products
          init_db()
          check_all_products()
          "

      # Salva o banco atualizado no cache
      - name: 💾 Salvar banco de dados
        uses: actions/cache@v4
        with:
          path: prices.db
          key: prices-db-${{ github.ref_name }}-${{ github.run_id }}

      - name: ✅ Concluído
        run: echo "Verificação de preços finalizada com sucesso."
